name: Build Desktop App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**', 'app/**', 'next.config.*') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache generated app icons
        id: icon-cache
        uses: actions/cache@v4
        with:
          path: src-tauri/icons
          key: tauri-icons-v1

      - name: Generate app icons
        if: steps.icon-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          $size = 1024
          $bmp = New-Object System.Drawing.Bitmap($size, $size)
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.Clear([System.Drawing.Color]::FromArgb(0, 102, 179))
          $font = New-Object System.Drawing.Font("Arial", 400, [System.Drawing.FontStyle]::Bold)
          $brush = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::White)
          $sf = New-Object System.Drawing.StringFormat
          $sf.Alignment = [System.Drawing.StringAlignment]::Center
          $sf.LineAlignment = [System.Drawing.StringAlignment]::Center
          $g.DrawString("I", $font, $brush, [System.Drawing.RectangleF]::FromLTRB(0, 0, $size, $size), $sf)
          New-Item -ItemType Directory -Force -Path "app-icon-src" | Out-Null
          $bmp.Save("app-icon-src\icon.png", [System.Drawing.Imaging.ImageFormat]::Png)
          $g.Dispose(); $bmp.Dispose()
          npx tauri icon app-icon-src\icon.png

      - name: Build app
        run: pnpm tauri build
        env:
          NEXT_PUBLIC_USE_MOCK_DATA: true

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: IngramCRM-Windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
