name: Build & Release

on:
  workflow_dispatch:

concurrency:
  group: build-release
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUSTUP_MAX_RETRIES: 10

jobs:
  build-and-release:
    runs-on: windows-latest
    environment: production
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('next.config.*') }}
          restore-keys: nextjs-${{ runner.os }}-

      - name: Sync version to Tauri files
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = process.env.VERSION;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        if: github.ref != 'refs/heads/main'
        run: pnpm test

      - name: Build changelog
        id: changelog
        shell: bash
        env:
          CURRENT_VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAGS=$(git tag --list 'v*')

          BODY=$(TAGS="$TAGS" CURR_VER="$CURRENT_VERSION" node -e "
            const fs = require('fs');
            const path = require('path');
            const curr = process.env.CURR_VER;
            const toNum = (v) => { const [a,b,c] = v.split('.').map(Number); return a*1e6 + b*1e3 + c; };
            const cu = toNum(curr);
            // Highest existing tag strictly below current = the previous release.
            // -1 means no prior tag is visible (e.g. tags weren't fetched).
            const prev = (process.env.TAGS || '')
              .split('\n')
              .map((t) => t.trim().replace(/^v/, ''))
              .filter((t) => /^\d+\.\d+\.\d+$/.test(t))
              .map(toNum)
              .filter((v) => v < cu)
              .reduce((max, v) => Math.max(max, v), -1);
            // When the previous release is unknown, bound to the current version
            // only — never dump the entire history.
            const floor = prev >= 0 ? prev : cu - 1;
            const dir = '.changelog';
            if (!fs.existsSync(dir)) { process.exit(0); }
            const files = fs.readdirSync(dir)
              .filter((f) => /^v\d+\.\d+\.\d+\.md$/.test(f))
              .map((f) => ({ file: f, ver: f.slice(1, -3), val: toNum(f.slice(1, -3)) }))
              .filter(({ val }) => val > floor && val <= cu)
              .sort((a, b) => b.val - a.val);
            const sections = files.map(({ file, ver }) => {
              const content = fs.readFileSync(path.join(dir, file), 'utf8').trim().replace(/^(?:#+ )?v[\d.]+\n*/, '');
              return '**v' + ver + '**\n' + content;
            });
            console.log(sections.join('\n\n'));
          ")
          if [ -n "$BODY" ]; then
            {
              echo "body<<CHANGELOG_EOF"
              echo "$BODY"
              echo "CHANGELOG_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No changelog files found at or below v${CURRENT_VERSION}"
            echo "body=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build, sign, and release
        uses: tauri-apps/tauri-action@v0.5
        timeout-minutes: 25
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NEXT_PUBLIC_AZURE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_AZURE_CLIENT_ID }}
          NEXT_PUBLIC_AZURE_TENANT_ID: ${{ secrets.NEXT_PUBLIC_AZURE_TENANT_ID }}
          NEXT_PUBLIC_D365_BASE_URL: ${{ secrets.NEXT_PUBLIC_D365_BASE_URL }}
          NEXT_PUBLIC_USE_MOCK_DATA: false
        with:
          tagName: v${{ steps.version.outputs.version }}
          releaseName: Ingram CRM v${{ steps.version.outputs.version }}
          releaseBody: ${{ steps.changelog.outputs.body }}
          updaterJsonPreferNsis: true
