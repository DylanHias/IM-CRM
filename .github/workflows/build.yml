name: Build & Release

on:
  workflow_dispatch:

concurrency:
  group: build-release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: node-cache-${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: node-cache-${{ runner.os }}-pnpm-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**', 'app/**', 'next.config.*') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-

      - name: Sync version to Tauri files
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = process.env.VERSION;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build changelog
        id: changelog
        shell: bash
        env:
          CURRENT_VERSION: ${{ steps.version.outputs.version }}
        run: |
          CURRENT="v${CURRENT_VERSION}"
          PREV_TAG=$(git tag --list 'v*' --sort=-version:refname | grep -v "^${CURRENT}$" | head -1 || true)
          PREV_VER="${PREV_TAG#v}"

          BODY=$(PREV_VER="$PREV_VER" CURR_VER="$CURRENT_VERSION" node -e "
            const fs = require('fs');
            const path = require('path');
            const prev = process.env.PREV_VER;
            const curr = process.env.CURR_VER;
            const dir = '.changelog';
            if (!fs.existsSync(dir)) { process.exit(0); }
            const files = fs.readdirSync(dir)
              .filter(f => /^v\d+\.\d+\.\d+\.md$/.test(f))
              .map(f => ({ file: f, ver: f.slice(1, -3) }))
              .filter(({ ver }) => {
                const [a,b,c] = ver.split('.').map(Number);
                const [pa,pb,pc] = (prev || '0.0.0').split('.').map(Number);
                const [ca,cb,cc] = curr.split('.').map(Number);
                const v = a*1e6 + b*1e3 + c;
                const p = pa*1e6 + pb*1e3 + pc;
                const cu = ca*1e6 + cb*1e3 + cc;
                return v > p && v <= cu;
              })
              .sort((a, b) => {
                const [a1,a2,a3] = a.ver.split('.').map(Number);
                const [b1,b2,b3] = b.ver.split('.').map(Number);
                return (b1*1e6+b2*1e3+b3) - (a1*1e6+a2*1e3+a3);
              });
            const sections = files.map(({ file, ver }) => {
              const content = fs.readFileSync(path.join(dir, file), 'utf8').trim().replace(/^#+ v[\d.]+\n*/, '');
              return '**v' + ver + '**\n' + content;
            });
            console.log(sections.join('\n\n'));
          ")
          if [ -n "$BODY" ]; then
            {
              echo "body<<CHANGELOG_EOF"
              echo "$BODY"
              echo "CHANGELOG_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No changelog files found between ${PREV_TAG:-start} and ${CURRENT}"
            echo "body=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build, sign, and release
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NEXT_PUBLIC_USE_MOCK_DATA: true
        with:
          tagName: v${{ steps.version.outputs.version }}
          releaseName: Ingram CRM v${{ steps.version.outputs.version }}
          releaseBody: ${{ steps.changelog.outputs.body }}
          updaterJsonPreferNsis: true
