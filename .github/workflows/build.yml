name: Build & Release

on:
  workflow_dispatch:

concurrency:
  group: build-release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    environment: production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Read version and sync to Tauri files
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = '$VERSION';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**', 'app/**', 'next.config.*') }}

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate changelog from commits
        id: changelog
        shell: bash
        run: |
          # Find the most recent release tag that is NOT the current version
          CURRENT="v${{ steps.version.outputs.version }}"
          PREV_TAG=$(git tag --list 'v*' --sort=-version:refname | grep -v "^${CURRENT}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi
          # Collect commits, skip version bumps and merges
          RAW=$(git log "$RANGE" --pretty=format:"%s" --no-merges \
            | grep -vi "^v[0-9]" \
            | grep -vi "^merge" \
            | grep -vi "^bump version")
          # Rewrite commit messages into user-friendly language
          BODY=$(node -e "
            const lines = process.argv[1].split('\n').filter(Boolean);
            const friendly = lines.map(msg => {
              let m = msg
                // Normalise verb tense
                .replace(/^Fix\b/i, 'Fixed')
                .replace(/^Add\b/i, 'Added')
                .replace(/^Update\b/i, 'Updated')
                .replace(/^Remove\b/i, 'Removed')
                .replace(/^Migrate\b/i, 'Migrated')
                .replace(/^Improve\b/i, 'Improved')
                .replace(/^Enable\b/i, 'Enabled')
                .replace(/^Reduce\b/i, 'Reduced')
                .replace(/^Brighten\b/i, 'Brightened')
                .replace(/^Decouple\b/i, 'Decoupled')
                .replace(/^Clean up\b/i, 'Cleaned up')
                .replace(/^Soften\b/i, 'Softened')
                .replace(/^Batch\b/i, 'Various')
                .replace(/^Set\b/i, 'Set')
                .replace(/^Show\b/i, 'Now showing')
                .replace(/^Move\b/i, 'Moved')
                .replace(/^Change[d]?\b/i, 'Changed')
                .replace(/^Smooth\b/i, 'Smoother')
                // Strip technical jargon
                .replace(/\bregex\b/gi, 'matching')
                .replace(/\bCSS variable-based\b/gi, '')
                .replace(/\bFK constraint errors?\b/gi, 'database errors')
                .replace(/\bNSIS\b/gi, 'installer')
                .replace(/\benv var\b/gi, 'setting')
                .replace(/\bDB\b/g, 'database')
                .replace(/\bUI\b/g, 'visual')
                .replace(/\bpopover\b/gi, 'popup')
                .replace(/\bcomponents\b/gi, 'elements')
                .replace(/\bcomponent\b/gi, 'element')
                .replace(/\brace condition\b/gi, 'timing issue')
                .replace(/\bmanual workflow.dispatch\b/gi, 'manual trigger')
                .replace(/\bworkflow.dispatch\b/gi, 'manual trigger')
                .replace(/\bTitleBar\b/g, 'title bar')
                .replace(/\bTopBar\b/g, 'top bar')
                .replace(/\bSidebar\b/g, 'sidebar')
                .replace(/\btrailing.slash mismatch in back link\b/gi, 'back button navigation')
                .replace(/\bmock data\b/gi, 'sample data')
                .replace(/\bsilent form submission failures\b/gi, 'forms failing without warning')
                .replace(/\bmin-width\b/gi, 'minimum width')
                .replace(/\bfavicon\b/gi, 'browser tab icon')
                .replace(/\bframeless window\b/gi, 'custom window')
                // Clean up double spaces and em dashes with technical suffixes
                .replace(/ — use .+$/i, '')
                .replace(/  +/g, ' ')
                .trim();
              return '- ' + m;
            });
            console.log(friendly.join('\n'));
          " "$RAW")
          {
            echo "body<<CHANGELOG_EOF"
            echo "### What's new since ${PREV_TAG:-the beginning}"
            echo ""
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build, sign, and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NEXT_PUBLIC_USE_MOCK_DATA: true
        with:
          tagName: v${{ steps.version.outputs.version }}
          releaseName: Ingram CRM v${{ steps.version.outputs.version }}
          releaseBody: ${{ steps.changelog.outputs.body }}
          updaterJsonPreferNsis: true
